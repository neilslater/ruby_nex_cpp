name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - '3.3'
          - '3.4'
          - '4.0'
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Compile native extension
        run: bundle exec rake compile
      - name: Run specs
        run: bundle exec rspec
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Build gem
        run: bundle exec gem build baz.gemspec
